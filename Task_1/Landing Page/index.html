<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Demo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="header">
        <div class="container">
            <!-- logo -->
            <div class="logo">
                <img src="image/ExpressVPN.png">
            </div>
            <!-- choose languages -->
            <div class="languages">
                <img src="image/world.png" alt="">
                <span class="options" >
                    <select>
                        <option value="English">English</option>
                        <option value="French">French</option>
                        <option value="Spanish">Spanish</option>
                    </select>
                </span> 
            </div>
        </div>
        <div class="container-data">
            <h2>The VPN that just works</h2>
            <p>Go further with the #1 trusted leader in VPN</p>
            <button class="btn" >Get ExpressVPN <span> <i class="fa-solid fa-arrow-right"></i> </span> </button>
            <h4>30-DAY MONEY-BACK GUARANTEE</h4>
        </div>
    </div>
    <!-- <div class="main-container">
    </div> -->
    <!-- footer -->
    <div class="footer">
        <h2>Ultra-fast servers around the globe</h2>
        <div class="f-container">
            <div class="side-1">
                <h1>160</h1>
                <p>locations</p>
            </div>
            <div class="side-2">
                <h1>94</h1>
                <p>countries</p>
            </div>
            <div class="side-3">
                <img src="image/infinity.png" alt="">
                <p>unlimited <br> bandwidth </p>
            </div>
        </div>
        <a href="">See our full list of VPN server locations <span> <i class="fa-solid fa-angle-down"></i> </span> </a>
    </div>
</body>
</html>
